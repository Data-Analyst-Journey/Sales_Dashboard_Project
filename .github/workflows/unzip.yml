name: Extract and Organize Files

on:
  push:
    paths:
      - '*.zip'

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Find and extract zip file
        run: |
          for zipfile in *.zip; do
            if [ -f "$zipfile" ]; then
              unzip -o "$zipfile" -d temp_extract/
              cp -r temp_extract/* ./
              rm "$zipfile"
              rm -rf temp_extract/
              break
            fi
          done
          
      - name: Commit extracted files
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Auto-extract zip file"
          file_pattern: "sql/** data/** reports/**"
